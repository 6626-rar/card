<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书馆熬夜大作战 - 卡牌肉鸽游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="game-container">
        <div class="header">
            <h1>图书馆熬夜大作战</h1>
            <p>大学生卡牌肉鸽游戏 - 赶论文生存挑战</p>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <h3>困意 (KN)</h3>
                <div class="stat-value" id="kn-value">0</div>
                <div class="stat-bar">
                    <div class="stat-fill kn-fill" id="kn-bar" style="width: 0%"></div>
                </div>
            </div>
            <div class="stat-card">
                <h3>专注</h3>
                <div class="stat-value" id="focus-value">0</div>
                <div class="stat-bar">
                    <div class="stat-fill focus-fill" id="focus-bar" style="width: 0%"></div>
                </div>
            </div>
            <div class="stat-card">
                <h3>精力</h3>
                <div class="stat-value" id="energy-value">0</div>
                <div class="stat-bar">
                    <div class="stat-fill energy-fill" id="energy-bar" style="width: 0%"></div>
                </div>
            </div>
            <div class="stat-card">
                <h3>HP</h3>
                <div class="stat-value" id="hp-value">0</div>
                <div class="stat-bar">
                    <div class="stat-fill hp-fill" id="hp-bar" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div class="player-panel">
                <h2>你的角色</h2>
                <div class="player-info">
                    <div class="player-avatar" id="player-avatar">📚</div>
                    <div class="player-stats">
                        <div class="player-stat">
                            <span class="stat-label">生命值</span>
                            <span class="stat-value" id="player-hp-display">100/100</span>
                        </div>
                        <div class="player-stat">
                            <span class="stat-label">专注度</span>
                            <span class="stat-value" id="player-focus-display">2</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="enemy-panel">
                <h2>当前敌人</h2>
                <div class="enemy-info">
                    <div class="enemy-name" id="enemy-name"></div>
                    <div class="enemy-hp" id="enemy-hp"></div>
                    <div class="stat-bar">
                        <div class="stat-fill hp-fill" id="enemy-hp-bar" style="width: 100%"></div>
                    </div>
                </div>
                <div id="enemy-action"></div>
            </div>
        </div>

        <div class="control-panel">
            <button class="btn btn-rest" id="rest-btn">休息 (-20 KN)</button>
            <button class="btn btn-primary" id="end-turn-btn">结束回合</button>
            <button class="btn btn-primary" id="next-level-btn">下一关</button>
        </div>

        <div class="event-panel hidden" id="event-panel">
            <h2>随机事件</h2>
            <div class="event-text" id="event-text"></div>
            <div class="event-options" id="event-options"></div>
        </div>

        <div class="card-area">
            <h2>你的卡牌</h2>
            <div class="cards-container" id="cards-container"></div>
        </div>

        <div class="map-container hidden" id="map-container">
            <h2>地图</h2>
        </div>

        <div class="modal hidden" id="game-over-modal">
            <div class="modal-content">
                <h2>游戏结束</h2>
                <p id="game-over-text"></p>
                <button class="btn btn-primary" id="restart-btn">重新开始</button>
            </div>
        </div>

        <div class="modal hidden" id="level-up-modal">
            <div class="modal-content">
                <h2>关卡完成！</h2>
                <p id="level-up-text"></p>
                <button class="btn btn-primary" id="continue-btn">继续</button>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
